name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DATABASE_URL: postgresql://postgres:password@localhost:5432/fitness
  ANTHROPIC_API_KEY: dummy_key
  AUTH_USERNAME: admin
  AUTH_PASSWORD: password
  NODE_ENV: test

jobs:
  quality:
    name: Lint, Typecheck & Schema Checks
    if: github.event_name == 'push' || !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun x biome ci .
      - run: bun run typecheck
      - run: bun x drizzle-kit check
      - name: Check schema/migration drift
        run: bash scripts/check-migrations.sh

  build:
    name: Build
    if: github.event_name == 'push' || !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run build

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build/
          retention-days: 1

  test:
    name: Unit & Integration Tests
    if: github.event_name == 'push' || !github.event.pull_request.draft
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fitness
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run db:dev
      - run: bun run db:seed
      - run: bun run test

  e2e:
    name: E2E Tests
    if: github.event_name == 'push' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    needs: build

    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 0

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: fitness
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/fitness
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun prerequisites
        run: apt-get update && apt-get install -y unzip

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build

      - run: bun run db:dev
      - run: bun run db:seed

      - run: bun run test:e2e
        env:
          AUTH_USERNAME: testuser
          AUTH_PASSWORD: testpassword

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
