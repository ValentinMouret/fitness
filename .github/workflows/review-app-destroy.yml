name: Review App Destroy

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  destroy:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Build destroy payload
        id: payload
        env:
          REVIEW_APP_SECRET: ${{ secrets.REVIEW_APP_SECRET }}
        run: |
          pr_number="${{ github.event.pull_request.number }}"
          payload="$(jq -nc --arg pr_number "$pr_number" '{pr_number: $pr_number}')"
          signature="sha256=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$REVIEW_APP_SECRET" -binary | xxd -p -c 256)"

          {
            echo "pr_number=$pr_number"
            echo "signature=$signature"
            echo "payload<<EOF"
            echo "$payload"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Trigger review app destroy
        env:
          PAYLOAD: ${{ steps.payload.outputs.payload }}
          REVIEW_APP_DESTROY_URL: ${{ secrets.REVIEW_APP_DESTROY_URL }}
          SIGNATURE: ${{ steps.payload.outputs.signature }}
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Review-App-Signature: $SIGNATURE" \
            --data "$PAYLOAD" \
            "$REVIEW_APP_DESTROY_URL"

      - name: Upsert PR comment
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.payload.outputs.pr_number }}
        with:
          script: |
            const issue_number = Number(process.env.PR_NUMBER);
            const marker = "<!-- review-app -->";
            const body = [marker, "🧹 **Review app destroyed**"].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body,
            });
